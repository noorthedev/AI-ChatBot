<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #fff;
    }
    .card {
      width: 420px; height: 600px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      display: flex; flex-direction: column;
    }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #1565c0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-info .name { font-size: 15px; font-weight: 600; }
    .header-info .status { font-size: 12px; color: #69f0ae; }
    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .msg { display: flex; gap: 8px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .bot  .msg-avatar { background: #1565c0; }
    .user .msg-avatar { background: rgba(255,255,255,0.15); }
    .msg-bubble { padding: 10px 14px; font-size: 14px; line-height: 1.55; border-radius: 16px; }
    .bot  .msg-bubble { background: rgba(255,255,255,0.1); border-radius: 4px 16px 16px 16px; }
    .user .msg-bubble { background: #1565c0; border-radius: 16px 4px 16px 16px; }
    .typing-bubble { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: blink 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity:0.3; transform:scale(1); }
      40% { opacity:1; transform:scale(1.2); }
    }
    .input-row {
      display: flex; gap: 8px; padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
    }
    .input-row textarea {
      flex: 1; resize: none; padding: 10px 14px; font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: #fff;
      outline: none; height: 42px; max-height: 120px;
      overflow-y: auto; line-height: 1.4; transition: border 0.3s;
    }
    .input-row textarea::placeholder { color: rgba(255,255,255,0.4); }
    .input-row textarea:focus { border-color: #90caf9; }
    .send-btn {
      width: 42px; height: 42px; border-radius: 14px; border: none;
      background: #1565c0; color: #fff; font-size: 18px;
      cursor: pointer; transition: background 0.3s, transform 0.1s;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover  { background: #1976d2; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <div class="name">AI Assistant</div>
      <div class="status">● Online</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">Assalam-o-Alaikum! Main aapka AI assistant hoon. Kuch bhi poochh sakte hain 😊</div>
    </div>
  </div>
  <div class="input-row">
    <textarea id="userInput" placeholder="Apna message likhein..."></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const history = [
    { role: "assistant", content: "Assalam-o-Alaikum! Main aapka AI assistant hoon. Kuch bhi poochh sakte hain 😊" }
  ];

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  function appendMessage(role, text) {
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    div.innerHTML = `
      <div class="msg-avatar">${isUser ? '👤' : '🤖'}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typingIndicator';
    div.innerHTML = `<div class="msg-avatar">🤖</div>
      <div class="msg-bubble typing-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = ''; inputEl.style.height = '42px';
    sendBtn.disabled = true;
    history.push({ role: 'user', content: text });
    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'Tum ek helpful aur friendly AI assistant ho. Urdu ya English mein jawab do jis mein user baat kare.',
          messages: history
        })
      });

      const data = await res.json();
      removeTyping();
      if (data.error) throw new Error(data.error.message);
      const reply = data.content?.[0]?.text || 'Koi jawab nahi mila.';
      history.push({ role: 'assistant', content: reply });
      appendMessage('bot', reply);
    } catch (err) {
      removeTyping();
      appendMessage('bot', '❌ Error: ' + err.message);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
